name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Run tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-and-attach:
    name: Build and attach release assets
    needs: test
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Decode release keystore
        env:
          BGG_MEEPL_KEYSTORE_BASE64: ${{ secrets.BGG_MEEPL_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$BGG_MEEPL_KEYSTORE_BASE64" | base64 -d > android/keystore/bgg_meeple_release.keystore

      - name: Build Android release
        env:
          BGG_MEEPL_KEYSTORE_PATH: ${{ github.workspace }}/android/keystore/bgg_meeple_release.keystore
          BGG_MEEPL_KEYSTORE_PASSWORD: ${{ secrets.BGG_MEEPL_KEYSTORE_PASSWORD }}
          BGG_MEEPL_KEY_ALIAS: ${{ secrets.BGG_MEEPL_KEY_ALIAS }}
          BGG_MEEPL_KEY_PASSWORD: ${{ secrets.BGG_MEEPL_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Remove decoded keystore
        if: always()
        run: rm -f android/keystore/bgg_meeple_release.keystore

      - name: Rename Android APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/bgg-meeple-android.apk

      - name: Package Linux release
        run: |
          cd build/linux/x64/release
          tar -czf "bgg-meeple-linux-${{ github.ref_name }}.tar.gz" bundle

      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/linux/x64/release/bgg-meeple-linux-*.tar.gz
            build/app/outputs/flutter-apk/bgg-meeple-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
